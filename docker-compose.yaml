version: '3'
services:
  python_editor:
    container_name: python_editor
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
    env_file:
      - .env
    restart: unless-stopped

volumes:
  n8n_data:

networks:
  app-network:
    driver: bridge
